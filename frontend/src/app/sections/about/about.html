<section id="about" class="py-5">
  <div class="container">
    <div class="row align-items-center">
      @if (data().image) {
        <div class="col-md-6">
          <img
            appHideBrokenImage
            [src]="data().image"
            alt="Workspace of {{ data().heading }}"
            class="img-fluid rounded shadow"
          />
        </div>
      }
      <div class="col-md-6">
        <h2 class="fw-bold mb-3">{{ data().heading }}</h2>
        @if (data().about) {
          <p class="lead mb-4">{{ data().about }}</p>
        }
        @if (data().extra) {
          <p>{{ data().extra }}</p>
        }
      </div>
    </div>
  </div>
</section>
